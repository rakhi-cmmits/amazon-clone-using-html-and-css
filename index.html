<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="heading">
        <h2>Rock Paper Scissors</h2>

    </div>
    <div class="main">
        <div id="paper" class="box">
            <img src="paper.png">
        </div>
        <div id="rock"  class="box">
            <img src="rock.png">
        </div>
        <div id="scissor"  class="box">
            <img src="scissors.png">
        </div>
    </div>
    <div class="scoreboard">
        <div id="user">
            <p class="score" id="userscore">0</p>
            <p>User</p>
        </div>
        <div id="comp">
            <p class="score" id="compscore">0</p>
            <p>Computer</p>
        </div>
    </div>
    <br><br>
    <div class="msgsection">
    <div class="msg">you want to move.</div>
    </div>
    <script src="script.js"></script>

    
</body>
</html>
